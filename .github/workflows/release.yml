name: Create Release

on:
  push:
    tags:
      - "v*" 
      - "beta-v*" 

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js (for changelog generation)
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install conventional-changelog-cli
        run: npm install -g conventional-changelog-cli

      - name: Generate changelog since last release
        id: changelog
        run: |
          # Generate changelog into a temporary file
          conventional-changelog -p angular -r 1 > tmp_changelog.md
          # Remove the first two lines (adjust -n +3 if needed)
          tail -n +3 tmp_changelog.md > CHANGELOG.md
          echo "Generated changelog:"
          cat CHANGELOG.md

      - name: Add installation instructions to release body
        run: |
          cat << 'EOF' >> CHANGELOG.md

          ---

          ![SCR-20251012-mlbs](https://github.com/user-attachments/assets/c9b8654e-ff7b-420c-b18c-8019af89058b)
          ![SCR-20251012-mlah](https://github.com/user-attachments/assets/b0c12a7f-d172-4ad4-a9cc-045cd705144e)
            
          ---

          # Installation and launching
          1. Run this command in the terminal
          ```bash
          git clone https://github.com/Redo7/se-dev-env
          cd se-dev-env
          npm i
          ```
          2. Rename the `.env.example` file to `.env` and replace the placeholder values:
          3. To run the app, choose one of the options below
            - Terminal: cd into the app's directory and run `npm run dev`
            - Raycast:
              - Open raycast and search for `Create Script Command`
              - Fill the fields, make sure the `Mode` is set to `Compact`, and save it wherever if fits you
              - Copy the commands in `raycast-run.sh to the file raycast made for you`
              - Run it from the app
            - VSCode: 
              - cd into the app's directory
              - Run `code .` in the terminal to open the app's folder in the editor.
              - Press `Ctrl + J` / `Cmd + J` to open the integrated terminal, and run `npm run dev`
          4. Open [http://localhost:5173/](http://localhost:5173/)
          > [!CAUTION]
          > VSCode Intellisense tends to break often (for me at least) when running `npm run dev` in the app's root folder via its integrated terminal.
          > This is most likely related to VSCode loading all the app files, overlays, and widgets, which results in the language server having trouble keeping up with all the references
          > It's best to run npm run dev in a dedicated terminal/raycast, and then open the widget you're working on in VSCode via the `Open in Editor` option in the context menu
          EOF

      - name: Zip repository contents
        run: |
          repo_name=$(basename "$GITHUB_REPOSITORY")
          mkdir -p build
          # Copy everything except build/ itself and .git/
          rsync -av --exclude 'build' --exclude '.git' --exclude '.github' ./ build/$repo_name
          cd build
          zip -r ../release.zip "$repo_name"
          cd ..

      - name: Get tag annotation (release title)
        id: tag_info
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          git fetch --tags --force --prune
          TITLE=$(git tag -l "$TAG_NAME" --format='%(contents)' | head -n 1 | xargs)
          # Fallback to tag name if no annotation (lightweight tag)
          if [ -z "$TITLE" ]; then
            TITLE="$TAG_NAME"
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ steps.tag_info.outputs.title }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      - name: Upload zipped release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release.zip
          asset_name: se-dev-env_${{ github.ref_name }}.zip
          asset_content_type: application/zip